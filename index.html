<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eddie's Couch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>Eddie's Couch</h1>
      <p class="subtitle">Static scene image plus story text. Mobile-friendly layout.</p>

      <figure class="scene-wrap">
        <img src="scene.svg" alt="Living room with couch, trash can full of hotdog buns, dog portrait, and microwave" />
      </figure>

      <section class="game">
        <h2>Story</h2>
        <p id="story"></p>
        <div class="choices">
          <button data-choice="intro">Scene 1</button>
          <button data-choice="act">Scene 2</button>
          <button data-choice="result">Scene 3</button>
          <button data-choice="friends">Scene 4</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
